name: brotli_codec
description: High-performance Brotli compression and decompression for Dart.
version: 1.0.0

environment:
  sdk: ^3.11.0

# Add regular dependencies here.
dependencies:
  ffi: ^2.2.0

dev_dependencies:
  ffigen: ^20.1.1
  hooks: ^1.0.2
  lints: ^6.0.0
  native_assets_cli: ^0.18.0
  native_toolchain_c: ^0.17.5
  test: ^1.25.6

ffigen:
  name: BrotliBindings
  description: 'Bindings to the Brotli compression library.'
  output: 'lib/src/brotli_bindings_generated.dart'
  silence-enum-warning: true
  compiler-opts:
    - '-Isrc/brotli/c/include'
    - '-I/usr/lib/gcc/x86_64-linux-gnu/15/include'
    - '-I/usr/local/include'
    - '-I/usr/include/x86_64-linux-gnu'
    - '-I/usr/include'
  headers:
    entry-points:
      - 'src/brotli/c/include/brotli/decode.h'
      - 'src/brotli/c/include/brotli/encode.h'
      - 'src/brotli/c/include/brotli/types.h'
  exclude-all-by-default: true
  functions:
    include:
      - 'Brotli.*'
  structs:
    include:
      - 'Brotli.*'
  enums:
    include:
      - 'Brotli.*'
  unnamed-enums:
    include:
      - 'BROTLI_.*'
  macros:
    include:
      - 'BROTLI_.*'
  typedefs:
    include:
      - 'Brotli.*'
      - 'brotli_.*'
  llvm-path:
    - '/usr/lib/llvm-14'
    - '/usr/lib/llvm-15'
    - '/usr/lib/llvm-16'
    - '/usr/local/opt/llvm'
  preamble: |
    // ignore_for_file: always_specify_types
    // ignore_for_file: camel_case_types
    // ignore_for_file: non_constant_identifier_names
    // ignore_for_file: unused_element
    // ignore_for_file: unused_field
    // ignore_for_file: type=lint
  ffi-native:
    asset-id: 'package:brotli_codec/brotli_codec.dart'
